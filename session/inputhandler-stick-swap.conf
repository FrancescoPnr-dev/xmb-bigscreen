# Loads the per-user swapped-stick controller mapping (written by
# xmb-bigscreen-stick-swap) into the Bigscreen input handler only; games and
# other SDL apps keep the physical stick layout. A missing file is ignored.
[Service]
Environment=SDL_GAMECONTROLLERCONFIG_FILE=%h/.config/xmb-bigscreen/gamecontroller-swap.txt
