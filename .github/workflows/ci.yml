name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: REUSE compliance
        uses: fsfe/reuse-action@v5

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gettext libxml2-utils

      - name: Validate metadata and config
        run: |
          python3 -m json.tool metadata.json > /dev/null
          xmllint --noout contents/config/main.xml

      - name: Check translations
        run: |
          for po in po/*.po; do
            msgfmt --check --statistics "$po" -o /dev/null
          done

      - name: Test install into a staging prefix
        run: |
          sudo env PREFIX="$GITHUB_WORKSPACE/stage" ./install.sh
          test -f stage/share/plasma/plasmoids/org.kde.plasma.xmbbigscreen/metadata.json
          test -f stage/share/plasma/shells/org.kde.plasma.xmbbigscreen/metadata.json
          test -x stage/bin/plasma-xmbbigscreen-wayland
          test -f stage/share/wayland-sessions/plasma-xmbbigscreen-wayland.desktop
          test -x stage/bin/xmb-bigscreen-stick-swap
          if find stage -path "*xmbbigscreen*" | grep -qE "tools/|po/|README|REUSE"; then
            echo "dev files leaked into the install" && exit 1
          fi
